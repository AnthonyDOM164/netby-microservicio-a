services:
  postgres-credit:
    image: postgres:16-alpine
    container_name: postgres-credit
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-credit_evaluations}
      POSTGRES_USER: ${POSTGRES_USER:-credit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - credit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-credit_user} -d ${POSTGRES_DB:-credit_evaluations}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - credit-net

  microservicio-a:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microservicio-a-orquestador
    restart: unless-stopped
    environment:
      DB_JDBC_URL: jdbc:postgresql://postgres-credit:5432/${POSTGRES_DB:-credit_evaluations}
      DB_USERNAME: ${POSTGRES_USER:-credit_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      RISK_SCORE_GRPC_HOST: ${RISK_SCORE_GRPC_HOST:-host.docker.internal}
      RISK_SCORE_GRPC_PORT: ${RISK_SCORE_GRPC_PORT:-9000}
      RISK_DEUDAS_GRPC_HOST: ${RISK_DEUDAS_GRPC_HOST:-host.docker.internal}
      RISK_DEUDAS_GRPC_PORT: ${RISK_DEUDAS_GRPC_PORT:-9000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8088,http://127.0.0.1:4200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-credit:
        condition: service_healthy
    ports:
      - "${A_HTTP_PORT:-8080}:8080"
    networks:
      - credit-net

volumes:
  credit-postgres-data:

networks:
  credit-net:
    driver: bridge
