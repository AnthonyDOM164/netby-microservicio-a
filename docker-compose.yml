services:
  postgres-credit:
    image: postgres:16-alpine
    container_name: postgres-credit
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-credit_evaluations}
      POSTGRES_USER: ${POSTGRES_USER:-credit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-password}
    volumes:
      - credit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-credit_user} -d ${POSTGRES_DB:-credit_evaluations}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - credit-net

  microservicio-b:
    build:
      context: ./microservicio-b-servicio-riesgos
    container_name: microservicio-b
    restart: unless-stopped
    environment:
      GRPC_PORT: 9000
    expose:
      - "9000"
      - "8081"
    ports:
      - "${B_GRPC_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/q/health/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - credit-net

  microservicio-a:
    build:
      context: ./microservicio-a-orquestador
    container_name: microservicio-a
    restart: unless-stopped
    environment:
      DB_JDBC_URL: jdbc:postgresql://postgres-credit:5432/${POSTGRES_DB:-credit_evaluations}
      DB_USERNAME: ${POSTGRES_USER:-credit_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-password}
      RISK_SCORE_GRPC_HOST: microservicio-b
      RISK_SCORE_GRPC_PORT: 9000
      RISK_DEUDAS_GRPC_HOST: microservicio-b
      RISK_DEUDAS_GRPC_PORT: 9000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:8088}
    depends_on:
      postgres-credit:
        condition: service_healthy
      microservicio-b:
        condition: service_healthy
    ports:
      - "${A_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/q/health/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - credit-net

  frontend:
    build:
      context: ./credit-evaluation-react
      args:
        VITE_CREDIT_API_URL: /api
    container_name: credit-frontend
    restart: unless-stopped
    depends_on:
      microservicio-a:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-8088}:80"
    networks:
      - credit-net

volumes:
  credit-postgres-data:

networks:
  credit-net:
    driver: bridge
