quarkus.application.name=microservicio-a-orquestador
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

quarkus.smallrye-openapi.info-title=Microservicio A - Orquestador de Credito
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Orquesta la evaluacion bancaria consultando riesgo por gRPC y persistiendo la decision.
quarkus.swagger-ui.always-include=true

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8088,http://127.0.0.1:4200}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Request-Id
quarkus.http.cors.exposed-headers=Location,X-Request-Id
quarkus.http.cors.access-control-allow-credentials=false
quarkus.http.cors.access-control-max-age=24H

quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.datasource.devservices.enabled=false
quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.migrate-at-start=false

quarkus.grpc.clients.score.host=${RISK_SCORE_GRPC_HOST:localhost}
quarkus.grpc.clients.score.port=${RISK_SCORE_GRPC_PORT:9000}
quarkus.grpc.clients.score.plain-text=true
quarkus.grpc.clients.deudas.host=${RISK_DEUDAS_GRPC_HOST:localhost}
quarkus.grpc.clients.deudas.port=${RISK_DEUDAS_GRPC_PORT:9000}
quarkus.grpc.clients.deudas.plain-text=true
